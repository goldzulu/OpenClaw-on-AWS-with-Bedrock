<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Enterprise — Product Guide</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--card:#222536;--border:#2d3148;--primary:#6366f1;--pl:#818cf8;--success:#10b981;--warn:#f59e0b;--danger:#ef4444;--cyan:#06b6d4;--text:#e2e8f0;--ts:#94a3b8;--tm:#64748b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.ctr{max-width:1100px;margin:0 auto;padding:20px}
.hdr{text-align:center;padding:40px 20px 24px;border-bottom:1px solid var(--border)}
.hdr h1{font-size:26px;margin-bottom:6px}
.hdr p{color:var(--ts);font-size:14px}
.lt{display:flex;gap:4px;justify-content:center;margin-top:14px}
.lb{padding:5px 16px;border-radius:20px;border:1px solid var(--border);background:0;color:var(--tm);cursor:pointer;font-size:13px;transition:.2s}
.lb.a{background:var(--primary);color:#fff;border-color:var(--primary)}
.rt{display:flex;gap:4px;justify-content:center;margin:20px 0;background:var(--surface);border-radius:10px;padding:4px;width:fit-content;margin-inline:auto}
.rtb{padding:8px 24px;border-radius:8px;border:0;background:0;color:var(--tm);cursor:pointer;font-size:14px;font-weight:500;transition:.2s}
.rtb.a{background:var(--primary);color:#fff}
.pb{display:flex;gap:2px;margin:16px 0 24px;overflow-x:auto;padding:4px 0}
.ps{flex:1;min-width:55px;text-align:center;padding:6px 2px;border-radius:8px;cursor:pointer;transition:.2s;border:1px solid transparent;font-size:9px}
.ps:hover{background:var(--surface)}.ps.a{background:var(--primary);border-color:var(--primary);color:#fff}
.ps.d{border-color:var(--success)}.ps .sn{display:block;font-size:9px;color:var(--tm)}.ps.a .sn,.ps.a .sl{color:#fff}
.ps.d .sn{color:var(--success)}.sl{font-weight:500;font-size:9px}
.sc{display:none}.sc.a{display:block}
.sk{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px}
.st{font-size:20px;font-weight:600;margin-bottom:4px}
.sd{color:var(--ts);font-size:14px;margin-bottom:16px}
.wb{border:1px solid rgba(245,158,11,.15);background:rgba(245,158,11,.04);border-radius:10px;margin:12px 0;overflow:hidden}
.wh{display:flex;align-items:center;gap:8px;padding:12px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--warn);user-select:none}
.wh::after{content:'▾';margin-left:auto;transition:.2s;font-size:11px}
.wb.c .wh::after{transform:rotate(-90deg)}
.wc{padding:0 16px 14px;font-size:13px;color:var(--ts);line-height:1.7}
.wb.c .wc{display:none}
.mk{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:14px 0}
.mh{background:var(--surface);padding:8px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px}
.mb{padding:14px}
.mi{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 11px;color:var(--text);font-size:12px;width:100%;display:block;margin-bottom:6px}
.btn{display:inline-block;padding:5px 14px;border-radius:8px;font-size:11px;font-weight:500;cursor:default}
.btn.p{background:var(--primary);color:#fff}.btn.s{background:var(--success);color:#fff}
.btn.g{background:0;border:1px solid var(--border);color:var(--ts)}
.bg{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.bg.gn{background:rgba(16,185,129,.12);color:var(--success)}.bg.yl{background:rgba(245,158,11,.12);color:var(--warn)}
.bg.bl{background:rgba(99,102,241,.12);color:var(--pl)}.bg.cy{background:rgba(6,182,212,.12);color:var(--cyan)}
.mt{width:100%;border-collapse:collapse;font-size:11px}
.mt th{text-align:left;padding:5px 8px;color:var(--tm);font-size:10px;text-transform:uppercase;border-bottom:1px solid var(--border);font-weight:500}
.mt td{padding:7px 8px;border-bottom:1px solid rgba(45,49,72,.4)}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.ss{text-align:center;padding:10px;background:var(--bg);border-radius:8px;border:1px solid var(--border)}
.ss .v{font-size:20px;font-weight:700}.ss .l{font-size:9px;color:var(--tm);margin-top:2px}
.an{display:flex;align-items:flex-start;gap:10px;border-radius:8px;padding:11px 14px;margin:10px 0;font-size:12px}
.an.i{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.15)}
.an.s{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15)}
.an.w{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15)}
.an.c{background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.15)}
.ai{font-size:15px;flex-shrink:0;margin-top:1px}.at{flex:1}.at strong{color:var(--text)}
.ch{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin:8px 0}
.cn{padding:3px 9px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid var(--border);background:var(--bg)}
.cn.p{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.3);color:var(--pl)}
.cn.s{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--success)}
.cn.c{background:rgba(6,182,212,.1);border-color:rgba(6,182,212,.3);color:var(--cyan)}
.ca{color:var(--tm);font-size:11px}
.cb{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;font-family:'SF Mono',Monaco,monospace;font-size:11px;color:var(--ts);white-space:pre-wrap;margin:6px 0;overflow-x:auto}
.nb{display:flex;justify-content:space-between;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}
.nvb{padding:9px 22px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;transition:.2s}
.nvb:hover{border-color:var(--primary);color:var(--pl)}.nvb.p{background:var(--primary);border-color:var(--primary);color:#fff}
.nvb:disabled{opacity:.35;cursor:not-allowed}
.sep{border-top:1px solid var(--border);margin:12px 0}
</style>
</head>
<body>
<div class="hdr">
  <h1 id="ht"></h1><p id="hp"></p>
  <div class="lt"><button class="lb a" onclick="L('en')">English</button><button class="lb" onclick="L('zh')">中文</button></div>
</div>
<div class="ctr">
  <div class="rt"><button class="rtb a" onclick="R('admin')" id="ra"></button><button class="rtb" onclick="R('emp')" id="re"></button></div>
  <div class="pb" id="pb"></div>
  <div id="sc"></div>
  <div class="nb">
    <button class="nvb" id="bp" onclick="P()">←</button>
    <button class="nvb p" id="bn" onclick="N()">→</button>
  </div>
</div>
<script>
let lang='en',role='admin',step=0;
const T={en:{t:'OpenClaw Enterprise — Product Guide',d:'Complete feature documentation for IT Administrators and Employees',admin:'IT Admin (20 steps)',emp:'Employee (8 steps)',prev:'← Previous',next:'Next →'},
zh:{t:'OpenClaw Enterprise — 产品功能指南',d:'面向 IT 管理员和员工的完整功能文档',admin:'IT 管理员 (20步)',emp:'员工 (8步)',prev:'← 上一步',next:'下一步 →'}};

function wb(eW,cW,eC,cC){return `<div class="wb" onclick="this.classList.toggle('c')"><div class="wh">💡 ${lang==='en'?'Design Intent / 设计意图':'设计意图 / Design Intent'}</div><div class="wc">${lang==='en'?eC:cC}</div></div>`;}
function an(icon,cls,e,c){return `<div class="an ${cls}"><span class="ai">${icon}</span><div class="at">${lang==='en'?e:c}</div></div>`;}
function mk(hdr,body){return `<div class="mk"><div class="mh">${hdr}</div><div class="mb">${body}</div></div>`;}
function op(title,steps){return `<div style="margin:10px 0"><div style="font-size:13px;font-weight:600;margin-bottom:8px">${title}</div>${steps.map((s,i)=>`<div style="display:flex;gap:8px;margin-bottom:6px;font-size:12px"><span style="background:var(--primary);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0">${i+1}</span><span style="color:var(--ts)">${s}</span></div>`).join('')}</div>`;}

const S={admin:[
// ─── 1. Architecture ───
{id:'arch',en:'Architecture Overview',zh:'架构总览',de:'The multi-layer pipeline from IM to AgentCore.',dz:'从 IM 到 AgentCore 的多层管道。',
h(){return wb('','',
'OpenClaw Enterprise uses a <strong>shared gateway + isolated microVM</strong> architecture. All employees share one EC2 instance for receiving messages, but each employee gets their own Firecracker microVM in AgentCore with their own SOUL, memory, and permissions. This gives you the cost efficiency of shared infrastructure with the security of complete isolation.',
'OpenClaw 企业版采用<strong>共享网关 + 隔离微虚拟机</strong>架构。所有员工共享一个 EC2 实例接收消息，但每个员工在 AgentCore 中拥有自己的 Firecracker 微虚拟机，有自己的 SOUL、记忆和权限。兼顾共享基础设施的成本效率和完全隔离的安全性。'
)+mk(lang==='en'?'Data Flow: Message → Response':'数据流：消息 → 响应',`<div class="ch" style="justify-content:center;flex-wrap:wrap"><span class="cn">IM Platform</span><span class="ca">→</span><span class="cn p">Gateway<br><small>18789</small></span><span class="ca">→</span><span class="cn c">H2 Proxy<br><small>8091</small></span><span class="ca">→</span><span class="cn s">Tenant Router<br><small>8090</small></span><span class="ca">→</span><span class="cn" style="background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2);color:#f87171">AgentCore VM</span><span class="ca">→</span><span class="cn">Bedrock</span></div><div class="sep"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:10px;color:var(--ts)"><div><strong style="color:var(--pl)">Gateway</strong> — ${lang==='en'?'Receives IM webhooks (Feishu, Telegram, Discord, Slack)':'接收 IM webhook（飞书、Telegram、Discord、Slack）'}</div><div><strong style="color:var(--cyan)">H2 Proxy</strong> — ${lang==='en'?'Intercepts Bedrock calls, handles pairing, enforces binding':'拦截 Bedrock 调用、处理配对、强制绑定检查'}</div><div><strong style="color:var(--success)">Tenant Router</strong> — ${lang==='en'?'Resolves IM user → employee → position → runtime':'解析 IM 用户 → 员工 → 岗位 → 运行时'}</div><div><strong style="color:#f87171">AgentCore</strong> — ${lang==='en'?'Isolated Firecracker VM per employee with full OpenClaw':'每员工独立 Firecracker VM，完整 OpenClaw 实例'}</div></div>`
)+`<div style="margin:12px 0"><div style="font-size:13px;font-weight:600;margin-bottom:6px">${lang==='en'?'SOUL 3-Layer Model — Agent Identity Inheritance':'SOUL 三层模型 — Agent 身份继承'}</div><div class="ch"><span class="cn" style="background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2);color:#f87171">🔒 Global</span><span class="ca">→</span><span class="cn p">✏️ Position</span><span class="ca">→</span><span class="cn s">✏️ Personal</span><span class="ca">=</span><span class="cn c">Merged SOUL</span></div><div style="font-size:10px;color:var(--tm)">${lang==='en'?'Global = company rules (locked by IT). Position = role expertise (managed by dept). Personal = preferences (editable by employee).':'全局 = 公司规则（IT 锁定）。岗位 = 角色专长（部门管理）。个人 = 偏好（员工可编辑）。'}</div></div>`
+an('📊','i',lang==='en'?'<strong>Key principle:</strong> 1000 employees can share one Feishu bot. Each message is routed to the correct employee\'s isolated AgentCore VM. The agent knows who it is, what tools it has, and what knowledge base to use — all assembled from DynamoDB and S3 at session start.':'<strong>核心原则：</strong>1000 名员工可共享一个飞书 bot。每条消息路由到正确员工的隔离 AgentCore VM。Agent 知道自己是谁、有什么工具、用什么知识库 — 全部在会话开始时从 DynamoDB 和 S3 组装。','')}},

// ─── 2. Deployment ───
{id:'deploy',en:'Deploy with deploy.sh',zh:'使用 deploy.sh 部署',de:'One-command deployment: infrastructure, Docker, data, services.',dz:'一键部署：基础设施、Docker、数据、服务。',
h(){return wb('','',
'A single <code>bash deploy.sh</code> handles everything: CloudFormation infrastructure, Docker image build on EC2, AgentCore runtime creation, data seeding, and service installation. No manual steps. Takes ~15 minutes for a fresh deployment.',
'一条 <code>bash deploy.sh</code> 搞定所有：CloudFormation 基础设施、EC2 上 Docker 镜像构建、AgentCore 运行时创建、数据种子和服务安装。无需手动步骤。全新部署约 15 分钟。'
)+an('💻','c',lang==='en'?`<strong>Quick Start:</strong><div class="cb">cd enterprise\ncp .env.example .env\n# Edit: STACK_NAME, REGION, ADMIN_PASSWORD\nbash deploy.sh</div>`:`<strong>快速开始：</strong><div class="cb">cd enterprise\ncp .env.example .env\n# 编辑：STACK_NAME, REGION, ADMIN_PASSWORD\nbash deploy.sh</div>`,''
)+mk(lang==='en'?'8 Automated Steps':'8 个自动化步骤',`<div style="display:flex;flex-direction:column;gap:3px">${[['1','Prerequisites','AWS CLI version check','2s'],['2','CloudFormation','VPC, EC2, ECR, S3, IAM, ECS, EFS','8 min'],['3','Docker Build','Agent container built on EC2, pushed to ECR','10 min'],['4','AgentCore Runtime','Serverless runtime with env vars','30s'],['5','S3 Templates','SOUL templates, skills, knowledge docs','10s'],['6','DynamoDB Seed','Employees, agents, bindings, settings, roles','15s'],['7','Secrets','SSM secrets + /etc/openclaw/env','10s'],['8','EC2 Services','Build frontend, install systemd services','2 min']].map(([n,name,desc,t])=>`<div style="display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:6px;background:var(--bg);font-size:11px"><span style="background:var(--primary);color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0">${n}</span><span style="font-weight:500;min-width:110px">${name}</span><span style="color:var(--tm);flex:1">${desc}</span><span style="color:var(--success);font-size:10px">${t}</span></div>`).join('')}</div>`
)+an('⚠️','w',lang==='en'?'<strong>Required .env:</strong> <code>STACK_NAME</code> (unique per account/region), <code>REGION</code> (with Bedrock+AgentCore), <code>ADMIN_PASSWORD</code>. If deploying multiple stacks in same account, also set <code>WORKSPACE_BUCKET_NAME</code>.':'<strong>必填 .env：</strong><code>STACK_NAME</code>（每账号/区域唯一）、<code>REGION</code>（需有 Bedrock+AgentCore）、<code>ADMIN_PASSWORD</code>。同账号多 stack 时需设 <code>WORKSPACE_BUCKET_NAME</code>。','')}},

// ─── 3. Login ───
{id:'login',en:'Access the Admin Console',zh:'登录管理控制台',de:'SSM port-forward → browser → sign in.',dz:'SSM 端口转发 → 浏览器 → 登录。',
h(){return wb('','',
'The Admin Console has <strong>no public URL</strong> — it runs behind AWS SSM Session Manager. Think of SSM as a VPN tunnel that only authorized IAM users can open. Even if someone discovers the EC2 IP, they cannot access the console without IAM credentials. This is zero-trust by design.',
'管理控制台<strong>没有公网 URL</strong> — 运行在 AWS SSM Session Manager 之后。可以把 SSM 理解为只有授权 IAM 用户才能打开的 VPN 隧道。即使有人发现 EC2 IP，没有 IAM 凭证也无法访问。这是零信任设计。'
)+an('💻','c',lang==='en'?`<strong>Connect:</strong><div class="cb">aws ssm start-session --target &lt;INSTANCE_ID&gt; --region &lt;REGION&gt; \\\n  --document-name AWS-StartPortForwardingSession \\\n  --parameters 'portNumber=8099,localPortNumber=8099'</div>Then open <strong>http://localhost:8099</strong> → Login with <code>emp-jiade / &lt;ADMIN_PASSWORD&gt;</code>`:`<strong>连接：</strong><div class="cb">aws ssm start-session --target &lt;INSTANCE_ID&gt; --region &lt;REGION&gt; \\\n  --document-name AWS-StartPortForwardingSession \\\n  --parameters 'portNumber=8099,localPortNumber=8099'</div>打开 <strong>http://localhost:8099</strong> → 使用 <code>emp-jiade / &lt;ADMIN_PASSWORD&gt;</code> 登录`,''
)+an('✅','s',lang==='en'?'<strong>Roles:</strong> Admin (full access), Manager (org + agents), Employee (portal only). The login page shows demo accounts for quick testing.':'<strong>角色：</strong>Admin（完整访问）、Manager（组织+Agent）、Employee（仅门户）。登录页显示演示账号用于快速测试。','')}},

// ─── 4. Dashboard ───
{id:'dash',en:'Dashboard',zh:'仪表盘',de:'Setup checklist, stats, and quick actions.',dz:'配置清单、统计和快捷操作。',
h(){return wb('','',
'The dashboard is your <strong>command center</strong>. A setup checklist appears automatically when steps are incomplete, giving first-time admins a clear roadmap. Stat cards show real-time platform health. The goal: <strong>one screen to know if everything is OK</strong>.',
'仪表盘是您的<strong>指挥中心</strong>。设置清单在步骤未完成时自动显示，为首次管理员提供清晰路线图。统计卡片实时显示平台状态。目标：<strong>一个屏幕知道一切是否正常</strong>。'
)+an('📍','i',lang==='en'?'<strong>Navigate:</strong> Sidebar → Dashboard (first item). Shows: setup progress, employee count, active agents, quality score, system health.':'<strong>导航：</strong>侧边栏 → Dashboard（第一项）。显示：设置进度、员工数、活跃 Agent、质量分、系统状态。','')}},

// ─── 5. Departments ───
{id:'dept',en:'Department Structure',zh:'部门管理',de:'Create org hierarchy — the isolation boundary.',dz:'创建组织层级 — 隔离边界。',
h(){return wb('','',
'Departments are the <strong>top-level isolation boundary</strong>. Like physical office floors, they separate teams so a Sales agent cannot access Engineering knowledge bases. Managers only see agents within their department scope. Without departments, all agents share one flat pool with no governance.',
'部门是<strong>顶层隔离边界</strong>。就像大楼楼层，部门将团队分开：销售 Agent 无法访问工程知识库。经理只看到其管辖范围的 Agent。没有部门，所有 Agent 在一个无治理的平面池中。'
)+op(lang==='en'?'How to manage departments:':'如何管理部门：',lang==='en'?['Navigate to Organization → Department Tree','Click "Add Department" to create new ones. Set parent for sub-departments.','Drag to reorder. Each department shows headcount and active agents.','Departments cascade: deleting a parent moves children to root level.']:['导航到 Organization → Department Tree','点击"添加部门"创建。设置上级部门用于子部门。','拖拽排序。每个部门显示人数和活跃 Agent。','级联：删除上级部门会将子部门移到根级别。'])}},

// ─── 6. Positions ───
{id:'pos',en:'Positions — Agent DNA',zh:'岗位管理 — Agent 的 DNA',de:'Positions define SOUL, skills, tools, and permissions per role.',dz:'岗位定义每个角色的 SOUL、技能、工具和权限。',
h(){return wb('','',
'A Position is a <strong>job description for AI agents</strong>. It defines the SOUL template (personality + rules), default skills, knowledge bases, and tool permissions. Assign an employee to a position → their agent inherits everything. <strong>Change the position once → every agent in that role updates.</strong> This is the difference between managing 5 agents and managing 500.',
'岗位是 <strong>AI Agent 的岗位说明书</strong>。定义 SOUL 模板（个性 + 规则）、默认技能、知识库和工具权限。将员工分配到岗位 → Agent 自动继承所有配置。<strong>修改一次岗位 → 该角色下每个 Agent 都更新。</strong>这就是管理 5 个和 500 个 Agent 的区别。'
)+op(lang==='en'?'Key operations:':'关键操作：',lang==='en'?['Organization → Positions. Each position shows member count and SOUL status.','Click a position → SOUL tab → write role-specific behavior (e.g. "You are a Solutions Architect at ACME Corp").','Skills & Tools tab → assign which tools this role can use (shell, browser, file, etc.).','Positions with "Empty" SOUL badge need attention — agents won\'t know their professional identity.']:['Organization → Positions。每个岗位显示成员数和 SOUL 状态。','点击岗位 → SOUL 标签 → 编写角色行为（如"你是 ACME 的解决方案架构师"）。','Skills & Tools 标签 → 分配工具权限（shell、browser、file 等）。','标记为 "Empty" SOUL 的岗位需要配置 — Agent 不知道自己的职业身份。'])}},

// ─── 7. Employees ───
{id:'emp',en:'Employee Management',zh:'员工管理',de:'Assign employees → agents auto-provisioned.',dz:'分配员工 → Agent 自动配置。',
h(){return wb('','',
'Each employee maps 1:1 to an agent. <strong>Auto-provisioning</strong> means you never manually configure individual agents — assign the employee to the right position, and the platform creates their agent, binding, and workspace automatically. Like onboarding a new hire: give them a role → they get laptop, access badge, and training materials.',
'每个员工 1:1 对应一个 Agent。<strong>自动配置</strong>意味着您无需手动配置每个 Agent — 将员工分配到正确岗位，平台自动创建 Agent、绑定和工作区。就像新员工入职：给一个角色 → 自动获得笔记本、门禁和培训。'

function L(l){lang=l;document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('a',b.textContent.includes(l==='en'?'English':'中文')));U();}
function R(r){role=r;step=0;document.querySelectorAll('.rtb').forEach(t=>t.classList.remove('a'));document.getElementById(r==='admin'?'ra':'re').classList.add('a');U();}
function G(i){step=i;U();window.scrollTo({top:200,behavior:'smooth'});}
function P(){if(step>0)G(step-1);}
function N(){if(step<S[role].length-1)G(step+1);}
function U(){
  const t=T[lang];
  document.getElementById('ht').textContent=t.t;
  document.getElementById('hp').textContent=t.d;
  document.getElementById('ra').textContent=t.admin;
  document.getElementById('re').textContent=t.emp;
  document.getElementById('bp').innerHTML=t.prev;
  document.getElementById('bn').innerHTML=t.next;
  document.getElementById('bp').disabled=step===0;
  document.getElementById('bn').disabled=step===S[role].length-1;
  const steps=S[role];
  document.getElementById('pb').innerHTML=steps.map((s,i)=>`<div class="ps ${i===step?'a':''} ${i<step?'d':''}" onclick="G(${i})"><span class="sn">${i<step?'✓':i+1}</span><span class="sl">${(lang==='en'?s.en:s.zh).split(/[—–]/)[0].trim().substring(0,12)}</span></div>`).join('');
  document.getElementById('sc').innerHTML=steps.map((s,i)=>`<div class="sc ${i===step?'a':''}"><div class="sk"><div class="st">${lang==='en'?s.en:s.zh}</div><div class="sd">${lang==='en'?s.de:s.dz}</div>${s.h()}</div></div>`).join('');
}
U();
</script>
</body>
</html>
